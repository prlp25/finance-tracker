<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PoLedger</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="PoLedger" />
<meta name="theme-color" content="#3B82F6" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="manifest" href="manifest.json" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --patrick:#2563EB; --patrick-light:#DBEAFE; --patrick-bg:#EFF6FF;
    --aica:#E879A0; --aica-light:#FCE7F3; --aica-bg:#FDF2F8;
    --bg:#F1F5F9; --card:#FFFFFF; --border:#E2E8F0;
    --text:#0F172A; --text-muted:#64748B; --text-light:#94A3B8;
    --success:#16A34A; --success-light:#DCFCE7;
    --warning:#D97706; --warning-light:#FEF3C7;
    --shadow-sm:0 1px 2px rgba(0,0,0,0.04),0 1px 3px rgba(0,0,0,0.06);
    --shadow-md:0 4px 6px rgba(0,0,0,0.04),0 2px 4px rgba(0,0,0,0.06);
    --shadow-lg:0 10px 25px rgba(0,0,0,0.06),0 4px 10px rgba(0,0,0,0.04);
    --shadow-xl:0 20px 50px rgba(0,0,0,0.1),0 8px 20px rgba(0,0,0,0.06);
    --radius:14px;
    --radius-lg:18px;
    --transition:0.25s cubic-bezier(0.4,0,0.2,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-text-size-adjust:100%;letter-spacing:-0.01em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  .app-header{background:rgba(255,255,255,0.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(226,232,240,0.6);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px;}
  .app-title{font-size:15px;font-weight:800;letter-spacing:-0.03em;color:var(--text);}
  .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .user-toggle{display:flex;background:#F1F5F9;border-radius:12px;padding:3px;gap:3px;}
  .user-btn{padding:8px 16px;border:none;border-radius:10px;cursor:pointer;font-weight:600;font-size:13px;transition:all var(--transition);background:transparent;color:var(--text-muted);}
  .user-btn.active-patrick{background:var(--patrick);color:white;box-shadow:0 2px 8px rgba(37,99,235,0.35);}
  .user-btn.active-aica{background:var(--aica);color:white;box-shadow:0 2px 8px rgba(232,121,160,0.35);}
  .container{max-width:960px;margin:0 auto;padding:20px;}
  .tabs{display:flex;gap:4px;background:rgba(255,255,255,0.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:var(--radius);padding:4px;margin-bottom:20px;border:1px solid rgba(226,232,240,0.5);overflow-x:auto;-webkit-overflow-scrolling:touch;box-shadow:var(--shadow-sm);}
  .tab-btn{flex:1;padding:10px 8px;border:none;border-radius:10px;cursor:pointer;font-weight:600;font-size:12px;transition:all var(--transition);background:transparent;color:var(--text-muted);white-space:nowrap;min-width:fit-content;letter-spacing:-0.01em;}
  .tab-btn:hover{color:var(--text);background:rgba(241,245,249,0.8);}
  .tab-btn.active{background:var(--text);color:white;box-shadow:0 2px 8px rgba(15,23,42,0.2);}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;margin-bottom:16px;box-shadow:var(--shadow-sm);transition:box-shadow var(--transition);}
  .card:hover{box-shadow:var(--shadow-md);}
  .card h2{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;letter-spacing:-0.02em;color:var(--text);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  .form-group.full-width{grid-column:1/-1;}
  .form-group label{font-size:11px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em;}
  .form-group input,.form-group select,.form-group textarea{padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:'Inter',inherit;outline:none;-webkit-appearance:none;background:white;transition:all var(--transition);color:var(--text);}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--patrick);box-shadow:0 0 0 3px rgba(37,99,235,0.12);background:white;}
  .form-group textarea{resize:vertical;min-height:42px;}
  .fund-options{display:flex;flex-wrap:wrap;gap:8px;}
  .fund-option{padding:9px 16px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;transition:all var(--transition);background:white;color:var(--text-muted);}
  .fund-option:hover{border-color:#CBD5E1;background:#F8FAFC;}
  .fund-option.selected{border-color:var(--patrick);background:var(--patrick-bg);color:var(--patrick);box-shadow:0 0 0 3px rgba(37,99,235,0.08);}
  .fund-option.selected-aica{border-color:var(--aica);background:var(--aica-bg);color:var(--aica);box-shadow:0 0 0 3px rgba(232,121,160,0.08);}
  .submit-btn{padding:14px 28px;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;transition:all var(--transition);color:white;width:100%;margin-top:10px;letter-spacing:-0.01em;}
  .submit-btn.patrick{background:var(--patrick);box-shadow:0 2px 8px rgba(37,99,235,0.25);}
  .submit-btn.patrick:hover{background:#1D4ED8;box-shadow:0 4px 12px rgba(37,99,235,0.35);transform:translateY(-1px);}
  .submit-btn.aica{background:var(--aica);box-shadow:0 2px 8px rgba(232,121,160,0.25);}
  .submit-btn.aica:hover{background:#D06B8D;box-shadow:0 4px 12px rgba(232,121,160,0.35);transform:translateY(-1px);}
  .submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}
  .submit-btn:active:not(:disabled){transform:translateY(0);}
  .summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
  .summary-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow-sm);transition:all var(--transition);}
  .summary-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
  .summary-card .amount{font-size:20px;font-weight:800;margin:6px 0 2px;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;}
  .summary-card .label{font-size:10px;color:var(--text-light);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;}
  .filter-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .filter-bar select,.filter-bar input[type=text]{padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:'Inter',inherit;outline:none;background:white;transition:all var(--transition);color:var(--text);}
  .filter-bar input[type=text]{flex:1;min-width:160px;}
  .filter-bar input[type=text]:focus,.filter-bar select:focus{border-color:var(--patrick);box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
  .expense-table{width:100%;border-collapse:separate;border-spacing:0 5px;}
  .expense-table thead th{text-align:left;padding:6px 10px;font-size:10px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em;}
  .expense-table tbody tr{transition:all var(--transition);}
  .expense-table tbody tr:hover{transform:scale(1.005);}
  .expense-table tbody td{padding:10px;font-size:13px;}
  .expense-table tbody td:first-child{border-left:4px solid;border-top-left-radius:var(--radius);border-bottom-left-radius:var(--radius);}
  .expense-table tbody td:last-child{border-top-right-radius:var(--radius);border-bottom-right-radius:var(--radius);}
  tr.row-patrick td{background:var(--patrick-bg);}
  tr.row-patrick td:first-child{border-left-color:var(--patrick);}
  tr.row-aica td{background:var(--aica-bg);}
  tr.row-aica td:first-child{border-left-color:var(--aica);}
  .badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
  .badge-savings{background:#E0E7FF;color:#4338CA;}
  .badge-opex{background:#FEF3C7;color:#B45309;}
  .badge-patrick{background:var(--patrick-light);color:var(--patrick);}
  .badge-aica{background:var(--aica-light);color:var(--aica);}
  .reimburse-btn{padding:5px 12px;border:1.5px solid var(--warning);background:var(--warning-light);color:#92400E;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;transition:all var(--transition);white-space:nowrap;}
  .reimburse-btn:hover{background:var(--warning);color:white;box-shadow:0 2px 6px rgba(217,119,6,0.3);}
  .reimbursed-badge{padding:5px 12px;background:var(--success-light);color:#16A34A;border:1.5px solid var(--success);border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .category-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#F1F5F9;color:var(--text-muted);white-space:nowrap;}
  .delete-btn{padding:6px 8px;border:none;background:transparent;color:#CBD5E1;cursor:pointer;border-radius:8px;font-size:16px;transition:all var(--transition);}
  .delete-btn:hover{background:#FEE2E2;color:#EF4444;transform:scale(1.1);}
  .edit-btn{padding:6px 8px;border:none;background:transparent;color:#CBD5E1;cursor:pointer;border-radius:8px;font-size:14px;transition:all var(--transition);}
  .edit-btn:hover{background:#DBEAFE;color:var(--patrick);transform:scale(1.1);}
  .breakdown-btn{padding:6px 8px;border:none;background:transparent;color:#CBD5E1;cursor:pointer;border-radius:8px;font-size:14px;transition:all var(--transition);}
  .breakdown-btn:hover{background:#FEF3C7;color:#B45309;}
  .data-btn{padding:7px 14px;border:1.5px solid var(--border);background:white;border-radius:var(--radius);font-size:12px;font-weight:600;cursor:pointer;transition:all var(--transition);color:var(--text-muted);}
  .data-btn:hover{background:#F8FAFC;color:var(--text);border-color:#CBD5E1;box-shadow:var(--shadow-sm);}
  .empty-state{text-align:center;padding:60px 20px;color:var(--text-light);}
  .empty-state .icon{font-size:48px;margin-bottom:12px;opacity:0.8;}
  .chart-row{display:flex;gap:20px;flex-wrap:wrap;}
  .chart-box{flex:1;min-width:280px;}
  .chart-box canvas{max-height:300px;}
  .reimb-section{margin-top:10px;padding:14px 16px;background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:var(--radius);}
  .reimb-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;}
  .reimb-toggle input[type=checkbox]{width:18px;height:18px;accent-color:var(--warning);cursor:pointer;}
  .reimb-toggle-label{font-size:14px;font-weight:600;color:#92400E;}
  .reimb-details{margin-top:12px;display:flex;flex-direction:column;gap:10px;}
  .reimb-to-options{display:flex;gap:8px;}
  .reimb-to-opt{padding:7px 16px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:all var(--transition);background:white;}
  .reimb-to-opt.sel-patrick{border-color:var(--patrick);background:var(--patrick-bg);color:var(--patrick);}
  .reimb-to-opt.sel-aica{border-color:var(--aica);background:var(--aica-bg);color:var(--aica);}
  .reimb-pct-row{display:flex;align-items:center;gap:12px;}
  .reimb-pct-row input[type=range]{flex:1;accent-color:var(--warning);height:6px;}
  .reimb-pct-value{font-size:18px;font-weight:800;min-width:52px;text-align:center;color:#92400E;}
  .reimb-pct-calc{font-size:13px;color:#92400E;font-weight:500;margin-top:2px;}
  .reimb-sublabel{font-size:11px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px;}
  .balance-card{border-radius:var(--radius-lg);padding:28px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow-sm);}
  .balance-card.patrick-card{background:linear-gradient(145deg,#EFF6FF 0%,#DBEAFE 100%);border:1.5px solid rgba(37,99,235,0.2);}
  .balance-card.aica-card{background:linear-gradient(145deg,#FDF2F8 0%,#FCE7F3 100%);border:1.5px solid rgba(232,121,160,0.2);}
  .balance-amount{font-size:36px;font-weight:900;margin:10px 0 4px;letter-spacing:-0.04em;font-variant-numeric:tabular-nums;}
  .balance-subtitle{font-size:13px;color:var(--text-muted);font-weight:500;}
  .balance-label{font-size:15px;font-weight:700;letter-spacing:-0.02em;}
  .balance-detail-table{width:100%;border-collapse:collapse;margin-top:14px;}
  .balance-detail-table th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em;border-bottom:2px solid var(--border);}
  .balance-detail-table td{padding:8px 10px;font-size:13px;border-bottom:1px solid #F1F5F9;}
  .net-banner{border-radius:var(--radius-lg);padding:22px;text-align:center;margin-bottom:16px;background:white;border:1.5px solid var(--border);box-shadow:var(--shadow-sm);}
  .net-banner .net-amount{font-size:30px;font-weight:900;margin:6px 0;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;}
  .acct-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
  .acct-card{border-radius:var(--radius-lg);padding:20px;text-align:center;border:1.5px solid var(--border);background:white;cursor:pointer;transition:all var(--transition);box-shadow:var(--shadow-sm);}
  .acct-card:hover{border-color:rgba(37,99,235,0.3);box-shadow:var(--shadow-lg);transform:translateY(-2px);}
  .acct-card .acct-icon{font-size:28px;margin-bottom:6px;}
  .acct-card .acct-name{font-size:11px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em;}
  .acct-card .acct-bal{font-size:26px;font-weight:900;margin:6px 0;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;}
  .acct-card .acct-sub{font-size:11px;color:var(--text-muted);line-height:1.5;}
  .acct-card .acct-tap{font-size:10px;color:var(--patrick);margin-top:8px;font-weight:600;opacity:0.7;transition:opacity var(--transition);}
  .acct-card:hover .acct-tap{opacity:1;}
  .acct-edit{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:8px;}
  .acct-edit input{width:110px;padding:6px 8px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;text-align:center;font-family:'Inter',inherit;outline:none;}
  .acct-edit button{padding:6px 12px;border:1.5px solid var(--border);background:#F8FAFC;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;transition:all var(--transition);}
  .acct-edit button:hover{background:#E2E8F0;}
  .setup-screen{max-width:440px;margin:60px auto;padding:36px;text-align:center;}
  .setup-screen h1{font-size:30px;margin-bottom:8px;letter-spacing:-0.04em;font-weight:900;}
  .setup-screen p{color:var(--text-muted);margin-bottom:20px;line-height:1.6;font-size:14px;}
  .setup-input{width:100%;padding:14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:'Inter',inherit;outline:none;text-align:center;margin-bottom:12px;transition:all var(--transition);}
  .setup-input:focus{border-color:var(--patrick);box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
  .setup-go{padding:14px 32px;background:var(--patrick);color:white;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:all var(--transition);box-shadow:0 2px 8px rgba(37,99,235,0.25);}
  .setup-go:hover{background:#1D4ED8;box-shadow:0 4px 12px rgba(37,99,235,0.35);transform:translateY(-1px);}
  .setup-go:disabled{opacity:0.5;transform:none;box-shadow:none;}
  .sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
  .sync-ok{background:var(--success);}
  .sync-loading{background:var(--warning);animation:pulse 1s infinite;}
  .sync-error{background:#EF4444;}
  .sync-status{font-size:11px;color:var(--text-light);display:flex;align-items:center;font-weight:500;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .loading-overlay{position:fixed;inset:0;background:rgba(241,245,249,0.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:14px;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--patrick);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;animation:fadeIn 0.2s ease-out;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .modal-box{background:white;border-radius:var(--radius-lg);padding:28px;max-width:540px;width:100%;box-shadow:var(--shadow-xl);max-height:90vh;overflow-y:auto;animation:slideUp 0.25s ease-out;}
  @keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .modal-box h3{font-size:17px;font-weight:700;margin-bottom:16px;letter-spacing:-0.02em;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}
  .modal-actions button{padding:10px 20px;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;transition:all var(--transition);letter-spacing:-0.01em;}
  .btn-cancel{background:#F1F5F9;color:var(--text-muted);}
  .btn-cancel:hover{background:#E2E8F0;color:var(--text);}
  .btn-danger{background:#EF4444;color:white;box-shadow:0 2px 6px rgba(239,68,68,0.25);}
  .btn-danger:hover{background:#DC2626;box-shadow:0 4px 10px rgba(239,68,68,0.35);}
  .btn-primary{background:var(--patrick);color:white;box-shadow:0 2px 6px rgba(37,99,235,0.25);}
  .btn-primary:hover{background:#1D4ED8;box-shadow:0 4px 10px rgba(37,99,235,0.35);}
  .quick-add-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .quick-add-btn{padding:9px 16px;border:1.5px dashed var(--border);border-radius:var(--radius);background:white;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-muted);transition:all var(--transition);display:flex;align-items:center;gap:5px;}
  .quick-add-btn:hover{border-color:var(--patrick);color:var(--patrick);background:var(--patrick-bg);border-style:solid;box-shadow:var(--shadow-sm);}
  .expense-cards{display:none;}
  .expense-card-item{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;border-left:4px solid;box-shadow:var(--shadow-sm);transition:all var(--transition);}
  .expense-card-item:active{transform:scale(0.99);}
  .expense-card-item.card-patrick{background:var(--patrick-bg);border-left-color:var(--patrick);}
  .expense-card-item.card-aica{background:var(--aica-bg);border-left-color:var(--aica);}
  .expense-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .expense-card-desc{font-weight:700;font-size:15px;flex:1;letter-spacing:-0.01em;}
  .expense-card-amt{font-weight:800;font-size:17px;font-variant-numeric:tabular-nums;white-space:nowrap;letter-spacing:-0.02em;}
  .expense-card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;align-items:center;}
  .expense-card-notes{font-size:12px;color:var(--text-muted);margin-top:8px;font-style:italic;line-height:1.4;}
  .expense-card-actions{display:flex;gap:6px;margin-top:12px;justify-content:flex-end;align-items:center;padding-top:10px;border-top:1px solid rgba(226,232,240,0.5);}
  .desktop-table{display:block;}
  /* Driver salary day picker */
  .day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:10px 0;}
  .day-cell{text-align:center;border:1.5px solid var(--border);border-radius:var(--radius);padding:8px 4px;cursor:pointer;transition:all var(--transition);background:white;}
  .day-cell:hover{border-color:#CBD5E1;background:#F8FAFC;}

<script type="text/babel">
const{useState,useMemo,useRef,useEffect,useCallback}=React;

const HOUSEHOLD_CATEGORIES=['Groceries','Gas / Fuel','Driver Salary','Maid Salary','Restaurant / Eating Out','Home Improvements','Hobbies','Housing Expenses','Health/Medical','Other Expenses'];

/* --- Date normalization (BUG FIX) --- */
function normalizeDate(d){
  if(!d)return new Date().toISOString().split('T')[0];
  if(typeof d==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(d))return d;
  var dt=new Date(d);
  if(isNaN(dt.getTime())){
    // Try parsing common Google Sheets formats
    var str=String(d);
    var m=str.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
    if(m)return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
    // Try "Mon DD, YYYY" or other formats
    dt=new Date(str);
    if(isNaN(dt.getTime()))return new Date().toISOString().split('T')[0];
  }
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}

function normalizeExpenses(arr){
  return arr.map(function(e){return Object.assign({},e,{date:normalizeDate(e.date)});});
}
function normalizeDeposits(arr){
  return arr.map(function(d){return Object.assign({},d,{date:normalizeDate(d.date)});});
}

function safeDate(ds){return new Date(ds+'T00:00:00');}
function fmtDate(ds,opts){return safeDate(ds).toLocaleDateString('en-US',opts||{month:'short',day:'numeric'});}

const QUICK_ADDS=[

];

const SCRIPT_URL_KEY='finance_tracker_script_url';

function api(scriptUrl,method,body){
  if(method==='GET')return fetch(scriptUrl+'?action=getAll',{redirect:'follow'}).then(r=>r.json());
  return fetch(scriptUrl,{method:'POST',redirect:'follow',body:JSON.stringify(body)}).then(r=>r.json());
}

/* --- PieChart --- */
function PieChartCanvas({data,title}){
  const canvasRef=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{
    if(chartRef.current)chartRef.current.destroy();
    if(!canvasRef.current||data.length===0)return;
    chartRef.current=new Chart(canvasRef.current,{
      type:'doughnut',
      data:{labels:data.map(d=>d.name),datasets:[{data:data.map(d=>d.value),backgroundColor:data.map(d=>d.color),borderWidth:2,borderColor:'#fff',hoverOffset:8}]},
      options:{responsive:true,maintainAspectRatio:true,cutout:'45%',
        plugins:{
          legend:{display:true,position:'bottom',labels:{padding:14,usePointStyle:true,pointStyle:'circle',font:{size:11,weight:'600'}}},
          tooltip:{callbacks:{label:function(ctx){return ' '+ctx.label+': '+fmt(ctx.parsed);}},padding:10,cornerRadius:10,bodyFont:{size:13}},
          title:{display:!!title,text:title,font:{size:13,weight:'700'},color:'#64748B'}
        }
      }
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[data,title]);
  if(data.length===0)return React.createElement('div',{className:'empty-state',style:{padding:30}},React.createElement('div',null,'No data for this period'));
  return React.createElement('canvas',{ref:canvasRef});
}

}

/* --- Main App --- */
