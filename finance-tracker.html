<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PoLedger</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="PoLedger" />
<meta name="theme-color" content="#3B82F6" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="manifest" href="manifest.json" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --patrick:#2563EB; --patrick-light:#DBEAFE; --patrick-bg:#EFF6FF;
    --aica:#E879A0; --aica-light:#FCE7F3; --aica-bg:#FDF2F8;
    --accent:#6366F1;
    --bg:#F1F5F9; --card:#FFFFFF; --border:#E2E8F0;
    --text:#0F172A; --text-muted:#64748B; --text-light:#94A3B8;
    --success:#16A34A; --success-light:#DCFCE7;
    --warning:#D97706; --warning-light:#FEF3C7;
    --shadow-sm:0 1px 2px rgba(0,0,0,0.04),0 1px 3px rgba(0,0,0,0.06);
    --shadow-md:0 4px 6px rgba(0,0,0,0.04),0 2px 4px rgba(0,0,0,0.06);
    --shadow-lg:0 10px 25px rgba(0,0,0,0.06),0 4px 10px rgba(0,0,0,0.04);
    --shadow-xl:0 20px 50px rgba(0,0,0,0.1),0 8px 20px rgba(0,0,0,0.06);
    --radius:14px;
    --radius-lg:18px;
    --transition:0.25s cubic-bezier(0.4,0,0.2,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-text-size-adjust:100%;letter-spacing:-0.01em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  .app-header{background:rgba(255,255,255,0.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(226,232,240,0.6);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px;}
  .app-title{font-size:15px;font-weight:800;letter-spacing:-0.03em;color:var(--text);}
  .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .user-badge{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:6px 12px;background:#F1F5F9;border-radius:20px;}
  .switch-user-link{font-size:11px;color:var(--patrick);cursor:pointer;text-decoration:underline;font-weight:600;opacity:0.8;transition:opacity var(--transition);margin-left:8px;}
  .switch-user-link:hover{opacity:1;}
  .container{max-width:960px;margin:0 auto;padding:16px;padding-bottom:30px;}
  .upload-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .upload-btn{flex:1;min-width:90px;padding:12px 10px;border:1.5px dashed var(--border);border-radius:var(--radius);background:white;cursor:pointer;font-size:11px;font-weight:700;color:var(--text-muted);transition:all var(--transition);display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;}
  .upload-btn:hover{border-color:var(--patrick);color:var(--patrick);background:var(--patrick-bg);border-style:solid;box-shadow:var(--shadow-sm);}
  .upload-btn .upload-icon{font-size:22px;}
  .upload-btn.processing{opacity:0.6;pointer-events:none;}
  .tab-bar{background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(226,232,240,0.6);padding:6px 8px;display:flex;gap:4px;justify-content:space-around;max-width:960px;margin:0 auto;position:sticky;top:48px;z-index:99;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tab-btn{flex:1;padding:10px 8px;border:none;border-radius:var(--radius);cursor:pointer;font-weight:600;font-size:12px;transition:all var(--transition);background:transparent;color:var(--text-muted);white-space:nowrap;min-width:fit-content;letter-spacing:-0.01em;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .tab-btn:hover{color:var(--text);background:rgba(241,245,249,0.8);}
  .tab-btn.active{background:var(--text);color:white;box-shadow:0 2px 8px rgba(15,23,42,0.2);}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;margin-bottom:16px;box-shadow:var(--shadow-sm);transition:box-shadow var(--transition);}
  .card:hover{box-shadow:var(--shadow-md);}
  .card h2{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;letter-spacing:-0.02em;color:var(--text);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  .form-group.full-width{grid-column:1/-1;}
  .form-group label{font-size:11px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em;}
  .form-group input,.form-group select,.form-group textarea{padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:'Inter',inherit;outline:none;-webkit-appearance:none;background:white;transition:all var(--transition);color:var(--text);}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--patrick);box-shadow:0 0 0 3px rgba(37,99,235,0.12);background:white;}
  .form-group textarea{resize:vertical;min-height:60px;}
  .submit-btn{padding:14px 28px;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;transition:all var(--transition);color:white;width:100%;margin-top:10px;letter-spacing:-0.01em;}
  .submit-btn.patrick{background:var(--patrick);box-shadow:0 2px 8px rgba(37,99,235,0.25);}
  .submit-btn.patrick:hover{background:#1D4ED8;box-shadow:0 4px 12px rgba(37,99,235,0.35);transform:translateY(-1px);}
  .submit-btn.patrick:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}
  .submit-btn.patrick:active:not(:disabled){transform:translateY(0);}
  .summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
  .summary-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow-sm);transition:all var(--transition);}
  .summary-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
  .summary-card .amount{font-size:20px;font-weight:800;margin:6px 0 2px;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;}
  .summary-card .label{font-size:10px;color:var(--text-light);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;}
  .filter-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .filter-bar select,.filter-bar input[type=text]{padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:'Inter',inherit;outline:none;background:white;transition:all var(--transition);color:var(--text);}
  .filter-bar input[type=text]{flex:1;min-width:160px;}
  .filter-bar input[type=text]:focus,.filter-bar select:focus{border-color:var(--patrick);box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
  .expense-table{width:100%;border-collapse:separate;border-spacing:0 5px;}
  .expense-table thead th{text-align:left;padding:6px 10px;font-size:10px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em;}
  .expense-table tbody tr{transition:all var(--transition);}
  .expense-table tbody tr:hover{transform:scale(1.005);}
  .expense-table tbody td{padding:10px;font-size:13px;}
  .expense-table tbody td:first-child{border-left:4px solid;border-top-left-radius:var(--radius);border-bottom-left-radius:var(--radius);}
  .expense-table tbody td:last-child{border-top-right-radius:var(--radius);border-bottom-right-radius:var(--radius);}
  tr.row-patrick td{background:var(--patrick-bg);}
  tr.row-patrick td:first-child{border-left-color:var(--patrick);}
  tr.row-aica td{background:var(--aica-bg);}
  tr.row-aica td:first-child{border-left-color:var(--aica);}
  .badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
  .badge-scope{background:#DCFCE7;color:#16A34A;}
  .badge-personal{background:#EDE9FE;color:#7C3AED;}
  .badge-patrick{background:var(--patrick-light);color:var(--patrick);}
  .badge-aica{background:var(--aica-light);color:var(--aica);}
  .category-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#F1F5F9;color:var(--text-muted);white-space:nowrap;}
  .delete-btn{padding:6px 8px;border:none;background:transparent;color:#CBD5E1;cursor:pointer;border-radius:8px;font-size:16px;transition:all var(--transition);}
  .delete-btn:hover{background:#FEE2E2;color:#EF4444;transform:scale(1.1);}
  .edit-btn{padding:6px 8px;border:none;background:transparent;color:#CBD5E1;cursor:pointer;border-radius:8px;font-size:14px;transition:all var(--transition);}
  .edit-btn:hover{background:#DBEAFE;color:var(--patrick);transform:scale(1.1);}
  .empty-state{text-align:center;padding:60px 20px;color:var(--text-light);}
  .empty-state .icon{font-size:48px;margin-bottom:12px;opacity:0.8;}
  .chart-row{display:flex;gap:20px;flex-wrap:wrap;}
  .chart-box{flex:1;min-width:280px;}
  .chart-box canvas{max-height:300px;}
  .toggle-circle{width:22px;height:22px;border-radius:50%;border:2px solid #CBD5E1;background:white;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);flex-shrink:0;}
  .toggle-circle.on{border-color:var(--patrick);background:var(--patrick);}
  .toggle-circle.on-purple{border-color:#7C3AED;background:#7C3AED;}
  .toggle-circle.on-amber{border-color:#D97706;background:#D97706;}
  .toggle-circle svg{width:13px;height:13px;stroke:white;stroke-width:2.5;fill:none;opacity:0;transition:opacity var(--transition);}
  .toggle-circle.on svg,.toggle-circle.on-purple svg,.toggle-circle.on-amber svg{opacity:1;}
  .quick-add-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .quick-add-btn{padding:9px 16px;border:1.5px dashed var(--border);border-radius:var(--radius);background:white;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-muted);transition:all var(--transition);display:flex;align-items:center;gap:5px;}
  .quick-add-btn:hover{border-color:var(--patrick);color:var(--patrick);background:var(--patrick-bg);border-style:solid;box-shadow:var(--shadow-sm);}
  .acct-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
  .acct-card{border-radius:var(--radius-lg);padding:20px;text-align:center;border:1.5px solid var(--border);background:white;cursor:pointer;transition:all var(--transition);box-shadow:var(--shadow-sm);}
  .acct-card:hover{border-color:rgba(37,99,235,0.3);box-shadow:var(--shadow-lg);transform:translateY(-2px);}
  .acct-card .acct-icon{font-size:28px;margin-bottom:6px;}
  .acct-card .acct-name{font-size:11px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em;}
  .acct-card .acct-bal{font-size:26px;font-weight:900;margin:6px 0;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;}
  .acct-card .acct-sub{font-size:11px;color:var(--text-muted);line-height:1.5;}
  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;animation:fadeIn 0.2s ease-out;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .modal-box{background:white;border-radius:var(--radius-lg);padding:28px;max-width:540px;width:100%;box-shadow:var(--shadow-xl);max-height:90vh;overflow-y:auto;animation:slideUp 0.25s ease-out;}
  @keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .modal-box h3{font-size:17px;font-weight:700;margin-bottom:16px;letter-spacing:-0.02em;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}
  .modal-actions button{padding:10px 20px;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;transition:all var(--transition);letter-spacing:-0.01em;}
  .btn-cancel{background:#F1F5F9;color:var(--text-muted);}
  .btn-cancel:hover{background:#E2E8F0;color:var(--text);}
  .btn-danger{background:#EF4444;color:white;box-shadow:0 2px 6px rgba(239,68,68,0.25);}
  .btn-danger:hover{background:#DC2626;box-shadow:0 4px 10px rgba(239,68,68,0.35);}
  .btn-primary{background:var(--patrick);color:white;box-shadow:0 2px 6px rgba(37,99,235,0.25);}
  .btn-primary:hover{background:#1D4ED8;box-shadow:0 4px 10px rgba(37,99,235,0.35);}
  .setup-screen{max-width:440px;margin:60px auto;padding:36px;text-align:center;}
  .setup-screen h1{font-size:30px;margin-bottom:8px;letter-spacing:-0.04em;font-weight:900;}
  .setup-screen p{color:var(--text-muted);margin-bottom:20px;line-height:1.6;font-size:14px;}
  .setup-input{width:100%;padding:14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:'Inter',inherit;outline:none;text-align:center;margin-bottom:12px;transition:all var(--transition);}
  .setup-input:focus{border-color:var(--patrick);box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
  .setup-go{padding:14px 32px;background:var(--patrick);color:white;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:all var(--transition);box-shadow:0 2px 8px rgba(37,99,235,0.25);}
  .setup-go:hover{background:#1D4ED8;box-shadow:0 4px 12px rgba(37,99,235,0.35);transform:translateY(-1px);}
  .setup-go:disabled{opacity:0.5;transform:none;box-shadow:none;}
  .user-picker{position:fixed;inset:0;background:linear-gradient(180deg,#F8FAFC 0%,#E2E8F0 100%);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:30px;}
  .user-picker h1{font-size:30px;font-weight:900;letter-spacing:-0.04em;}
  .user-picker p{color:var(--text-muted);font-size:15px;text-align:center;max-width:300px;line-height:1.5;}
  .user-pick-btn{width:200px;padding:22px;border:2px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;font-size:18px;font-weight:700;transition:all var(--transition);background:white;text-align:center;box-shadow:var(--shadow-sm);}
  .user-pick-btn:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
  .user-pick-btn.pick-patrick:hover{border-color:var(--patrick);background:var(--patrick-bg);color:var(--patrick);}
  .user-pick-btn.pick-aica:hover{border-color:var(--aica);background:var(--aica-bg);color:var(--aica);}
  .rolling-banner{background:linear-gradient(145deg,#FEF9C3,#FDE68A);border:1.5px solid #F59E0B;border-radius:var(--radius);padding:4px 0;margin-bottom:16px;box-shadow:0 0 0 3px rgba(245,158,11,0.08);overflow:hidden;position:relative;}
  .rolling-item{padding:8px 14px 8px 8px;display:flex;align-items:center;gap:6px;min-height:44px;flex-shrink:0;}
  .rolling-item .notif-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
  .rolling-item .notif-text{font-size:13px;font-weight:700;color:#78350F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rolling-item .notif-sub{font-size:11px;color:#92400E;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .notif-dismiss{background:none;border:none;color:#B45309;font-size:13px;cursor:pointer;padding:2px 6px;border-radius:50%;transition:all var(--transition);flex-shrink:0;line-height:1;opacity:0.5;}
  .notif-dismiss:hover{opacity:1;background:rgba(180,83,9,0.12);}
  .rolling-item .notif-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .rolling-item .notif-badge{font-weight:700;font-size:12px;border-radius:8px;padding:3px 10px;white-space:nowrap;}
  .rolling-item .notif-badge.overdue{background:#FEE2E2;color:#DC2626;}
  .rolling-item .notif-badge.soon{background:#FEF3C7;color:#B45309;}
  .rolling-item .notif-badge.info{background:#DBEAFE;color:#2563EB;}
  .notif-pay-btn{padding:4px 12px;border:1.5px solid var(--success);background:var(--success-light);color:#16A34A;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;transition:all var(--transition);white-space:nowrap;}
  .notif-pay-btn:hover{background:var(--success);color:white;}
  .rolling-dots{display:flex;justify-content:center;gap:5px;padding:6px 0 8px;background:transparent;}
  .rolling-dot{width:6px;height:6px;border-radius:50%;background:#D4A017;opacity:0.35;transition:all 0.3s;cursor:pointer;}
  .rolling-dot.active{opacity:1;width:16px;border-radius:3px;}
  .bill-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;border-left:4px solid var(--warning);box-shadow:var(--shadow-sm);transition:all var(--transition);}
  .bill-card:hover{box-shadow:var(--shadow-md);}
  .bill-card .bill-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .bill-card .bill-name{font-weight:700;font-size:15px;flex:1;letter-spacing:-0.01em;}
  .bill-card .bill-amt{font-weight:800;font-size:17px;font-variant-numeric:tabular-nums;white-space:nowrap;letter-spacing:-0.02em;}
  .bill-card .bill-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center;}
  .bill-card .bill-actions{display:flex;gap:6px;margin-top:12px;justify-content:flex-end;align-items:center;padding-top:10px;border-top:1px solid rgba(226,232,240,0.5);}
  .bill-paid-btn{padding:6px 14px;border:1.5px solid var(--success);background:var(--success-light);color:#16A34A;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;transition:all var(--transition);}
  .bill-paid-btn:hover{background:var(--success);color:white;box-shadow:0 2px 6px rgba(22,163,74,0.3);}
  .reimb-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow-sm);transition:all var(--transition);}
  .reimb-card:hover{box-shadow:var(--shadow-md);}
  .reimb-card.owed{border-left:4px solid var(--warning);}
  .reimb-card.requested{border-left:4px solid var(--patrick);}
  .reimb-card.paid{border-left:4px solid var(--success);opacity:0.7;}
  .reimb-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .reimb-desc{font-weight:700;font-size:14px;letter-spacing:-0.01em;}
  .reimb-amt{font-weight:800;font-size:17px;font-variant-numeric:tabular-nums;white-space:nowrap;letter-spacing:-0.02em;}
  .reimb-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center;font-size:12px;color:var(--text-muted);}
  .reimb-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;}
  .reimb-badge.pending{background:#FEF3C7;color:#B45309;}
  .reimb-badge.complete{background:#DCFCE7;color:#16A34A;}
  .reimb-actions{display:flex;gap:6px;margin-top:12px;justify-content:flex-end;align-items:center;padding-top:10px;border-top:1px solid rgba(226,232,240,0.5);}
  .reimb-pay-btn{padding:8px 18px;border:1.5px solid var(--success);background:var(--success-light);color:#16A34A;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;transition:all var(--transition);}
  .reimb-pay-btn:hover{background:var(--success);color:white;box-shadow:0 2px 6px rgba(22,163,74,0.3);}
  .reimb-section-title{font-size:15px;font-weight:800;margin-bottom:12px;margin-top:20px;letter-spacing:-0.02em;display:flex;align-items:center;gap:8px;}
  .reimb-section-title:first-child{margin-top:0;}
  .reimb-count{background:var(--patrick-light);color:var(--patrick);font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;}
  .day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:10px 0;}
  .day-cell{text-align:center;border:1.5px solid var(--border);border-radius:var(--radius);padding:8px 4px;cursor:pointer;transition:all var(--transition);background:white;}
  .day-cell:hover{border-color:#CBD5E1;background:#F8FAFC;}
  .day-cell.checked{border-color:var(--success);background:var(--success-light);color:#16A34A;box-shadow:0 0 0 2px rgba(22,163,74,0.1);}

const fmt = (n) => '₱' + Number(n).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});

function normalizeDate(d){
  if(!d) return new Date().toISOString().split('T')[0];
  if(typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  var dt = new Date(d);
  if(isNaN(dt.getTime())){
    var str = String(d);
    var m = str.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
    if(m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
    dt = new Date(str);
    if(isNaN(dt.getTime())) return new Date().toISOString().split('T')[0];
  }
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}

function safeDate(ds){return new Date(ds+'T00:00:00');}
function fmtDate(ds,opts){return safeDate(ds).toLocaleDateString('en-US',opts||{month:'short',day:'numeric'});}

function api(scriptUrl,method,body){
  if(method==='GET') return fetch(scriptUrl+'?action=getAll',{redirect:'follow'}).then(r=>r.json());
  return fetch(scriptUrl,{method:'POST',redirect:'follow',body:JSON.stringify(body)}).then(r=>r.json());
}

function PieChartCanvas({data,title}){
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if(chartRef.current) chartRef.current.destroy();
    if(!canvasRef.current || data.length === 0) return;
    chartRef.current = new Chart(canvasRef.current,{
      type:'doughnut',
      data:{
        labels:data.map(d=>d.name),
        datasets:[{
          data:data.map(d=>d.value),
          backgroundColor:data.map(d=>d.color),
          borderWidth:2,
          borderColor:'#fff',
          hoverOffset:8
        }]
      },
      options:{
        responsive:true,
        maintainAspectRatio:true,
        cutout:'45%',
        plugins:{
          legend:{display:true,position:'bottom',labels:{padding:14,usePointStyle:true,pointStyle:'circle',font:{size:11,weight:'600'}}},
          tooltip:{callbacks:{label:function(ctx){return ' '+ctx.label+': '+fmt(ctx.parsed);}},padding:10,cornerRadius:10,bodyFont:{size:13}},
          title:{display:!!title,text:title,font:{size:13,weight:'700'},color:'#64748B'}
        }
      }
    });
    return () => {if(chartRef.current) chartRef.current.destroy();};
  },[data,title]);
  if(data.length === 0) return React.createElement('div',{className:'empty-state',style:{padding:30}},React.createElement('div',null,'No data for this period'));
  return React.createElement('canvas',{ref:canvasRef});
}

function ExpenseForm({onSubmit,onCancel,bankAccounts,currentUser,inline}){
  const [date,setDate] = useState(new Date().toISOString().split('T')[0]);
  const [desc,setDesc] = useState('');
  const [amount,setAmount] = useState('');
  const [category,setCategory] = useState('');
  const [account,setAccount] = useState(bankAccounts.length>0?bankAccounts[0].id:'');
  const [isHousehold,setIsHousehold] = useState(false);
  const [reimbursement,setReimbursement] = useState(false);
  const [reimburseTo,setReimburseTo] = useState('');
  const [reimbPercent,setReimbPercent] = useState(50);
  const [notes,setNotes] = useState('');
  const [receiptUrlLocal,setReceiptUrlLocal] = useState('');

  // Listen for OCR data
  useEffect(()=>{
    function onOcr(){
      var d=window.__ocrData;
      if(!d)return;
      if(d.storeName)setDesc(d.storeName);
      if(d.amount)setAmount(String(d.amount));
      if(d.date)setDate(d.date);
      if(d.category)setCategory(d.category);
      if(d.receiptUrl)setReceiptUrlLocal(d.receiptUrl);
      window.__ocrData=null;
    }
    window.addEventListener('ocr-complete',onOcr);
    // Check if there's already pending OCR data
    if(window.__ocrData){onOcr();}
    return ()=>window.removeEventListener('ocr-complete',onOcr);
  },[]);

  const cats = isHousehold ? HOUSEHOLD_CATEGORIES : PERSONAL_CATEGORIES;

  function handleSubmit(){
    if(!desc.trim()||!amount.trim()||!category||!account){alert('Fill all required fields');return;}
    const exp = {
      id:Date.now().toString(),
      date:normalizeDate(date),
      description:desc.trim(),
      amount:parseFloat(amount),
      category,
      fundSource:account,
      scope:isHousehold?'shared':'personal',
      user:currentUser,
      reimbursement:reimbursement?{to:reimburseTo,percent:reimbPercent}:null,
      notes:notes.trim(),
      receiptUrl:receiptUrlLocal||''
    };
    onSubmit(exp);
    // Reset form for inline usage
    if(inline){setDesc('');setAmount('');setCategory('');setNotes('');setIsHousehold(false);setReimbursement(false);setReceiptUrlLocal('');}
  }

  return React.createElement('div',{className:'card'},
    React.createElement('h2',null,'Add Expense'),

      ),
      React.createElement('div',{className:'form-group'},
        React.createElement('label',null,'Amount'),
        React.createElement('input',{type:'number',step:0.01,value:amount,onChange:e=>setAmount(e.target.value),placeholder:'0.00'})
      ),
      React.createElement('div',{className:'form-group'},
        React.createElement('label',null,'Description'),
        React.createElement('input',{type:'text',value:desc,onChange:e=>setDesc(e.target.value),placeholder:'Coffee, lunch, etc.'})
      ),
      React.createElement('div',{className:'form-group'},
        React.createElement('label',null,'Category'),
        React.createElement('select',{value:category,onChange:e=>setCategory(e.target.value)},

        )
      ),
      React.createElement('div',{className:'form-group'},
        React.createElement('label',null,'Account'),
        React.createElement('select',{value:account,onChange:e=>setAccount(e.target.value)},

        )
      ),
      React.createElement('div',{className:'form-group full-width'},
        React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,cursor:'pointer'},onClick:()=>{const next=!isHousehold;setIsHousehold(next);if(!next){setReimbursement(false);}}},
          React.createElement('div',{className:'toggle-circle'+(isHousehold?' on-purple':'')},

          ),

        )
      ),
      isHousehold && React.createElement('div',{className:'form-group full-width'},

    )

function RollingBanner({items,dismissed,onDismiss}){
  const visible = items.filter(function(item){return !dismissed[item.key];});
  const VISIBLE_COUNT = 2;
  const pages = [];
  for(var p=0;p<visible.length;p+=VISIBLE_COUNT){pages.push(visible.slice(p,p+VISIBLE_COUNT));}
  const [pageIdx,setPageIdx] = useState(0);
  const totalPages = pages.length;
  useEffect(()=>{
    if(totalPages<=1) return;
    const timer = setInterval(()=>setPageIdx(i=>(i+1)%totalPages), 5000);
    return ()=>clearInterval(timer);
  },[totalPages]);
  useEffect(()=>{if(pageIdx>=totalPages&&totalPages>0)setPageIdx(0);},[totalPages,pageIdx]);
  if(visible.length===0) return null;
  var currentPage = pages[pageIdx]||pages[0]||[];
  return React.createElement('div',{className:'rolling-banner'},
    currentPage.map(function(item){
      return React.createElement('div',{className:'rolling-item',key:item.key},
        React.createElement('button',{className:'notif-dismiss',onClick:function(ev){ev.stopPropagation();handleDismiss(item.key);},title:'Dismiss'},'✕'),
        React.createElement('div',{className:'notif-left'},
          React.createElement('div',{style:{minWidth:0}},
            React.createElement('div',{className:'notif-text'},item.text),
            item.sub&&React.createElement('div',{className:'notif-sub'},item.sub)
          )
        ),
        React.createElement('div',{className:'notif-right'},
          item.badge&&React.createElement('span',{className:'notif-badge '+item.badgeClass},item.badge),
          item.action&&React.createElement('button',{className:'notif-pay-btn',onClick:function(ev){ev.stopPropagation();item.action();}},item.actionLabel||'Pay Now')
        )
      );
    }),
    totalPages>1&&React.createElement('div',{className:'rolling-dots'},
      pages.map(function(_,i){return React.createElement('div',{key:i,className:'rolling-dot'+(i===pageIdx?' active':''),onClick:function(){setPageIdx(i);}});})
    )
  );
}

  function handleReceiptUpload(ev){
    var file=ev.target.files[0];
    if(!file)return;
    setOcrError('');
    setOcrProcessing(true);
    var reader=new FileReader();
    reader.onload=function(e2){
      var b64=e2.target.result;
      api(scriptUrl,'POST',{action:'ocrReceipt',photoBase64:b64}).then(function(d){
        setOcrProcessing(false);
        if(d.error){setOcrError(d.error);return;}
        if(d.receiptUrl)setReceiptUrl(d.receiptUrl);
        // Dispatch custom event with OCR data so inline ExpenseForm can pick it up
        window.__ocrData={storeName:d.storeName,amount:d.amount,date:d.date,category:d.category,receiptUrl:d.receiptUrl};
        window.dispatchEvent(new Event('ocr-complete'));
      }).catch(function(err){
        setOcrProcessing(false);
        setOcrError('OCR failed: '+err);
      });
    };
    reader.readAsDataURL(file);
    ev.target.value='';
  }

  function handleStatementUpload(ev){
    var file=ev.target.files[0];
    if(!file||!selectedCard)return;
    setCCOcrError('');setCCOcrProcessing(true);
    var reader=new FileReader();
    reader.onload=function(e2){
      var b64=e2.target.result;
      api(scriptUrl,'POST',{action:'ocrStatement',photoBase64:b64}).then(function(d){
        setCCOcrProcessing(false);
        if(d.error){setCCOcrError(d.error);return;}
        // Find existing expenses for duplicate detection
        var card=creditCards.find(c=>c.id===selectedCard);
        var itemsWithMeta=(d.items||[]).map(function(item,idx){
          // Check duplicates against existing expenses
          var isDuplicate=false;var dupType='';
          for(var ei=0;ei<expenses.length;ei++){
            var ex=expenses[ei];
            if(Math.abs(parseFloat(ex.amount)-item.amount)<0.01 && ex.date===item.date){
              isDuplicate=true;dupType='exact';break;
            }
            if(Math.abs(parseFloat(ex.amount)-item.amount)<0.01){
              var d1=new Date(ex.date),d2=new Date(item.date);
              if(Math.abs(d1-d2)<=(2*86400000)){isDuplicate=true;dupType='close';break;}
            }
          }
          // Auto-categorize from merchantMap
          var cat=item.category||'';
          var autoTagged=!!item.autoCategory;
          if(!cat){
            var descU=String(item.description).toUpperCase();
            for(var mi=0;mi<merchantMap.length;mi++){
              if(descU.indexOf(merchantMap[mi].pattern.toUpperCase())!==-1){
                cat=merchantMap[mi].category;autoTagged=true;break;
              }
            }
          }
          return {
            ...item,
            idx:idx,
            category:cat,
            autoTagged:autoTagged,
            isDuplicate:isDuplicate,
            dupType:dupType,
            skip:isDuplicate,
            isHousehold:false,
            fundSource:card?card.id:'',
            user:currentUser,
            scope:'personal',
            merchantPattern:item.merchantPattern||''
          };
        });
        setBatchItems(itemsWithMeta);
        setBatchRawText(d.rawText||'');
      }).catch(function(err){setCCOcrProcessing(false);setCCOcrError('OCR failed: '+err);});
    };
    reader.readAsDataURL(file);
    ev.target.value='';
  }
  function handleApproveBatch(){
    if(!batchItems||!selectedCard)return;
    var card=creditCards.find(c=>c.id===selectedCard);
    var approvedItems=batchItems.filter(function(it){return !it.skip;});
    // Check if batch reimbursement is enabled
    var householdItems=approvedItems.filter(function(it){return it.isHousehold;});
    var finalItems=approvedItems.map(function(it){
      return {
        date:it.date||new Date().toISOString().split('T')[0],
        description:it.description,
        amount:it.amount,
        category:it.category||'Other Personal',
        fundSource:card?card.name:'',
        user:currentUser,
        scope:it.isHousehold?'shared':'personal',
        reimbursable:it.reimbursable||false,
        reimbTo:it.reimbTo||'',
        reimbPct:it.reimbPct||50,
        merchantPattern:it.merchantPattern,
        skip:false
      };
    });
    var stmtId=Date.now().toString();
    var stmt={
      id:stmtId,
      creditCardId:selectedCard,
      billingMonth:new Date().toISOString().slice(0,7),
      totalAmount:finalItems.reduce(function(s,it){return s+it.amount;},0),
      dueDate:'',
      importedCount:finalItems.length
    };
    // Optimistic local update: add expenses
    var newExpenses=finalItems.map(function(it,i){
      return {
        id:'cc-'+stmtId+'-'+i,
        date:it.date,
        description:it.description,
        amount:it.amount,
        category:it.category,
        fundSource:it.fundSource,
        user:it.user,
        reimbursable:it.reimbursable,
        reimbursement:it.reimbursable?{to:it.reimbTo,percent:it.reimbPct}:null,
        reimbTo:it.reimbTo,
        reimbPct:it.reimbPct,
        reimbursed:false,
        notes:'CC Import',
        receiptUrl:'',
        scope:it.scope
      };
    });
    setExpenses([...newExpenses,...expenses]);
    setCCStatements([{...stmt,paid:false,paidDate:''},...ccStatements]);
    // Update merchant map locally
    var newMerchants=[];
    finalItems.forEach(function(it){
      if(it.merchantPattern&&it.category){
        var exists=merchantMap.some(function(m){return m.pattern.toUpperCase()===it.merchantPattern.toUpperCase();});
        if(!exists)newMerchants.push({pattern:it.merchantPattern,category:it.category,user:currentUser});
      }
    });
    if(newMerchants.length>0)setMerchantMap([...merchantMap,...newMerchants]);
    setBatchItems(null);setBatchRawText('');
    // Send to backend
    if(scriptUrl){
      api(scriptUrl,'POST',{action:'importCCStatement',statement:stmt,items:finalItems}).catch(function(err){console.error(err);});
    }
  }
